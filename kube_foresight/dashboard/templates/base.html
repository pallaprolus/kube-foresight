<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}kube-foresight{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                'kf': { 'dark': '#0f172a', 'sidebar': '#1e293b', 'accent': '#3b82f6', 'green': '#10b981', 'warn': '#f59e0b', 'danger': '#ef4444' }
            }}}
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900">
    <div class="flex h-full">
        {% include "partials/nav.html" %}
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="/static/js/app.js?v=2"></script>
    <script src="/static/js/charts.js?v=2"></script>
    <script src="/static/js/clipboard.js?v=2"></script>
    {% block scripts_extra %}{% endblock %}
</body>
</html>
